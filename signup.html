<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup | EarnSmartHub</title>
<style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, hsl(120, 97%, 34%), hwb(229 11% 67%)); /* Vibrant gradient */
    }

    .container {
        background: #fff;
        padding: 40px 30px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        width: 360px;
        text-align: center;
    }

    h2 {
        margin-bottom: 25px;
        font-size: 26px;
        color: #08c208;
    }

    form {
        display: flex;
        flex-direction: column;
    }

    label {
        text-align: left;
        margin-bottom: 5px;
        font-weight: 600;
        color: #333;
    }

    input {
        padding: 12px;
        margin-bottom: 20px;
        border: 2px solid #ddd;
        border-radius: 10px;
        outline: none;
        font-size: 16px;
        transition: border 0.3s, box-shadow 0.3s;
    }

    input:focus {
        border-color: #0ac251;
        box-shadow: 0 0 8px rgba(95, 255, 130, 0.4);
    }

    button {
        padding: 12px;
        background: hsl(133, 96%, 42%);
        color: #088018;
        font-weight: bold;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
    }

    button:hover {
        background: hsl(101, 91%, 44%);
    }

    #msg {
        margin-top: 15px;
        font-weight: bold;
        color: #0bcc2c;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Create Your Account</h2>
    <form onsubmit="signup(event)">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>

        <button type="submit">Sign Up</button>
    </form>
    <p id="msg"></p>
</div>

<script>
async function signup(e){
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        const res = await fetch("https://your-render-url.onrender.com/signup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        const msgEl = document.getElementById("msg");
        msgEl.innerText = data.message;

        if (res.ok) {
            msgEl.style.color = "green";
            document.getElementById("email").value = "";
            document.getElementById("password").value = "";
        } else {
            msgEl.style.color = "#ff4b4b";
        }
    } catch(err) {
        const msgEl = document.getElementById("msg");
        msgEl.innerText = "Server error ❌";
        msgEl.style.color = "#ff4b4b";
        console.error(err);
    }
}
</script>

</body>
</html>
