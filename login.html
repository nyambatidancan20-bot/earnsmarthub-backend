<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | EarnSmartHub</title>

<style>
/* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* Background */
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #36d1dc, #5b86e5);
}

/* Card container */
.container {
    background: #fff;
    padding: 40px 30px;
    border-radius: 20px;
    width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
}

/* Title */
h2 {
    margin-bottom: 25px;
    color: #5b86e5;
}

/* Labels */
label {
    display: block;
    text-align: left;
    margin-bottom: 5px;
    font-weight: 600;
    color: #333;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 2px solid #ddd;
    border-radius: 10px;
    font-size: 16px;
    outline: none;
    transition: 0.3s;
}

/* Input focus effect */
input:focus {
    border-color: #5b86e5;
    box-shadow: 0 0 8px rgba(91,134,229,0.4);
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    background: #5b86e5;
    color: #fff;
    font-weight: bold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

/* Button hover */
button:hover {
    background: #36d1dc;
}

/* Message */
#msg {
    margin-top: 15px;
    font-weight: bold;
    color: red;
}
</style>
</head>

<body>

<div class="container">
    <h2>Welcome Back 👋</h2>

    <form onsubmit="login(event)">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>

        <button type="submit">Login</button>
    </form>

    <p id="msg"></p>
</div>

<script>
async function login(e){
    e.preventDefault();

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    try {
        let res = await fetch("https://your-render-url.onrender.com/login", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({email,password})
        });

        let data = await res.json();

        if(data.token){
            localStorage.setItem("token", data.token);
            window.location.href = "dashboard.html";
        } else {
            let msg = document.getElementById("msg");
            msg.innerText = data.message;
            msg.style.color = "red";
        }

    } catch(err){
        let msg = document.getElementById("msg");
        msg.innerText = "Server error ❌";
        msg.style.color = "red";
        console.error(err);
    }
}
</script>

</body>
</html>
